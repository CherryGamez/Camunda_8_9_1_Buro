{{- $va := .Values.vaultAgent -}}
{{/*
Bootstrap Job: runs `camunda-vault-agent fetch` once, before the main release
resources, so ALL per-app Secrets already exist when Elasticsearch / Keycloak /
PostgreSQL pods boot and resolve them via env.

pre-install/pre-upgrade hook (weight 0, after the SA/RBAC/ConfigMap hooks).
Idempotent: reconciles every secret on each install/upgrade. Performs no restart.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: camunda-vault-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: camunda-platform
    app.kubernetes.io/component: vault-agent
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: camunda-platform
        app.kubernetes.io/component: vault-agent-bootstrap
    spec:
      serviceAccountName: {{ $va.bootstrap.serviceAccountName }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vault-bootstrap
          image: {{ $va.image | quote }}
          imagePullPolicy: {{ $va.imagePullPolicy }}
          args: ["fetch"]
          envFrom:
            - configMapRef:
                name: camunda-vault-agent-env
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: vault-agent-config
              mountPath: /etc/camunda-vault-agent
              readOnly: true
            - name: vault-tmp
              mountPath: /tmp
            {{- if $va.trustedCa.enabled }}
            - name: trusted-ca
              mountPath: /etc/pki/ca-trust/extracted/pem
              readOnly: true
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "64Mi" }
      volumes:
        - name: vault-agent-config
          configMap:
            name: camunda-vault-bootstrap-config
        - name: vault-tmp
          emptyDir: {}
        {{- if $va.trustedCa.enabled }}
        - name: trusted-ca
          configMap:
            name: {{ $va.trustedCa.configMapName }}
            optional: true
            items:
              - key: service-ca.crt
                path: tls-ca-bundle.pem
        {{- end }}
